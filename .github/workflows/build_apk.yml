name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório
      - uses: actions/checkout@v4

      # 2. Configura a versão estável do Flutter compatível com seu código
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      # 3. Remove os metadados do Embedding V1 e força o V2 no AndroidManifest e nas classes
      - name: Forçar Android Embedding V2 Completo
        run: |
          echo "Atualizando AndroidManifest.xml..."
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST_PATH" ]; then
            # Remove a tag antiga do Flutter Embedding V1 que bloqueia o Media Kit
            sed -i '/android:name="io.flutter.app.FlutterApplication"/d' "$MANIFEST_PATH"
            sed -i '/android:name="io.flutter.embedding.android.SplashScreenDrawable"/d' "$MANIFEST_PATH"
          fi

          echo "Recriando caminhos das atividades..."
          # Garante que as pastas corretas existam e injeta as MainActivities limpas no formato V2
          mkdir -p android/app/src/main/kotlin/com/example/runtv_player
          cat << 'EOF' > android/app/src/main/kotlin/com/example/runtv_player/MainActivity.kt
          package com.example.runtv_player

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

          mkdir -p android/app/src/main/java/com/example/runtv_player
          cat << 'EOF' > android/app/src/main/java/com/example/runtv_player/MainActivity.java
          package com.example.runtv_player;

          import io.flutter.embedding.android.FlutterActivity;

          public class MainActivity extends FlutterActivity {
          }
          EOF

      # 4. Ajusta o wakelock_plus para uma versão compatível com o Dart 3.2.6
      - name: Ajustar dependência do Wakelock
        run: flutter pub add wakelock_plus:1.1.4 --offline

      # 5. Baixa as dependências do pubspec
      - name: Install dependencies
        run: flutter pub get

      # 6. Compila o APK pulando validações rígidas de Gradle moderno
      - name: Build APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      # 7. Salva o APK gerado para você baixar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/*.apk
