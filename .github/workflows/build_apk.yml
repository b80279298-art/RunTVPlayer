name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório
      - uses: actions/checkout@v4

      # 2. Configura o Flutter automaticamente (ele já traz o Java interno necessário)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Baixa as dependências do Flutter (isso cria os caminhos que estavam faltando)
      - name: Install dependencies
        run: flutter pub get

      # 4. Compila o APK usando o próprio comando do Flutter (muito mais seguro)
      - name: Build APK
        run: flutter build apk --debug

      # 5. Salva o APK gerado para você baixar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/*.apk
