name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle Moderno
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5' # Versão compatível com Java 17

      - name: Criar arquivos do Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
          find . -name "*.apk" -o -name "*.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: 'android/app/build/outputs/apk/**/*.apk'
