name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório
      - uses: actions/checkout@v4

      # 2. Configura a versão exata do Flutter compatível com seu código
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9' # Versão que aceita o código do seu app

      # 3. Baixa as dependências do pubspec
      - name: Install dependencies
        run: flutter pub get

      # 4. Compila o APK pulando validações rígidas de Gradle moderno
      - name: Build APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      # 5. Salva o APK gerado para você baixar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/*.apk
