name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o seu código
      - uses: actions/checkout@v4

      # 2. Configura a versão correta do Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      # 3. Reconstrói a pasta Android do zero contornando o erro de nome de pacote
      - name: Recriar estrutura Android Limpa
        run: |
          echo "Deletando pasta antiga..."
          rm -rf android
          
          echo "Gerando nova estrutura Android compatível..."
          cd ..
          flutter create --platforms=android runtv_player
          
          echo "Movendo a pasta android corrigida para o repositório..."
          mv runtv_player/android RunTVPlayer/
          cd RunTVPlayer

      # 4. Corrige as incompatibilidades de código Dart automaticamente
      - name: Corrigir Código Dart Antigo
        run: |
          echo "Ajustando chamadas obsoletas do player_manager.dart..."
          # Comenta as linhas do setProperty que geram erro no media_kit antigo
          sed -i 's/await player.setProperty/\/\/ await player.setProperty/g' lib/managers/player_manager.dart
          
          echo "Ajustando propriedades ausentes do layout_picker_screen.dart..."
          # Ajusta a comparação de layout removendo a propriedade ausente 'isSelected'
          sed -i 's/old.isSelected != isSelected/old.mode != mode/g' lib/screens/layout_picker_screen.dart

      # 5. Ajusta o wakelock_plus para uma versão compatível com o Dart 3.2.6
      - name: Ajustar dependência do Wakelock
        run: flutter pub add wakelock_plus:1.1.4 --offline

      # 6. Baixa as dependências do pubspec
      - name: Install dependencies
        run: flutter pub get

      # 7. Compila o APK usando o comando limpo compatível com Flutter 3.16
      - name: Build APK
        run: flutter build apk --debug

      # 8. Salva o APK gerado para você baixar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/*.apk
