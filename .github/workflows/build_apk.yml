name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o seu código
      - uses: actions/checkout@v4

      # 2. Configura a versão correta do Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      # 3. Reconstrói a pasta Android do zero no padrão moderno (V2)
      - name: Recriar estrutura Android Limpa
        run: |
          echo "Deletando pasta antiga e gerando uma nova com suporte nativo a V2..."
          rm -rf android
          flutter create . --platforms=android

      # 4. Ajusta o wakelock_plus para uma versão compatível com o Dart 3.2.6
      - name: Ajustar dependência do Wakelock
        run: flutter pub add wakelock_plus:1.1.4 --offline

      # 5. Baixa as dependências do pubspec
      - name: Install dependencies
        run: flutter pub get

      # 6. Compila o APK
      - name: Build APK
        run: flutter build apk --debug --android-skip-build-dependency-validation

      # 7. Salva o APK gerado para você baixar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/*.apk
