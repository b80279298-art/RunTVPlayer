name: runtv_player
description: Multi-view streaming app for M3U8, MP4, MPEG-TS and DASH streams
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.11
  media_kit_video: ^1.1.11
  media_kit_libs_android_video: ^1.3.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  path_provider: ^2.1.3
  flutter_colorpicker: ^1.1.0
  animations: ^2.0.11
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
